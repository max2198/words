name: Deploy App
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          host: ${{ secrets.HOST }}
          username: root
          password: ${{ secrets.PASSWORD }}
          port: 2221 # Убедись, что на сервере настроен именно этот порт!
          envs: GH_TOKEN
          script: |
            mkdir -p ~/projects/my-app
            cd ~/projects/my-app

            # Очистка папки от предыдущих неудачных попыток
            if [ ! -d .git ]; then
              echo "Cleaning up directory..."
              rm -rf * .git
            fi

            echo "Cloning repository..."
            git clone https://github.com . || (git fetch --all && git reset --hard origin/main)

            echo "Current files in folder:"
            ls -F

            if [ -f "docker-compose.yml" ]; then
              echo "Starting Docker..."
              docker compose up -d --build
            else
              echo "CRITICAL ERROR: docker-compose.yml not found!"
              echo "Ensure the file is in the root of your repository."
              exit 1
            fi
