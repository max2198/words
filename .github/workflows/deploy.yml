name: Deploy App
on:
  push:
    branches: [ main ] # Скрипт сработает при пуше в ветку main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: root
          password: ${{ secrets.PASSWORD }}
          port: 2221 # Твой новый порт SSH
          script: |
            mkdir -p ~/projects/my-app
            cd ~/projects/my-app
            
            # Если папка .git существует — обновляем, если нет — клонируем
            if [ -d .git ]; then
              echo "Updating repository..."
              git pull origin main
            else
              echo "Cloning repository..."
              # ЗАМЕНИ 'ТВОЙ_ЛОГИН' И 'ТВОЙ_РЕПО' на свои реальные данные из адресной строки браузера
              git clone https://github.com .
            fi
            
            # Запускаем docker-compose. 
            # Добавили флаг -f, чтобы исключить ошибку "not found"
            if [ -f docker-compose.yml ]; then
              docker compose up -d --build
            else
              echo "Error: docker-compose.yml not found in repository!"
              exit 1
            fi
