name: Deploy App
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: root
          password: ${{ secrets.PASSWORD }}
          port: 2221 # Оставь свой порт (2221 или 2222)
          script: |
            # Декодируем ссылку на лету, чтобы избежать обрезания слэшей
            REPO_URL=$(echo "aHR0cHM6Ly9naXRodWIuY29tL21heDIxOTgvd29yZHMuZ2l0" | base64 --decode)
            
            mkdir -p ~/projects/my-app
            cd ~/projects/my-app
            
            echo "Cleaning up..."
            rm -rf * .git
            
            echo "Cloning from URL..."
            git clone "$REPO_URL" .
            
            echo "Files list:"
            ls -F
            
            if [ -f "docker-compose.yml" ]; then
              docker compose up -d --build
            else
              echo "CRITICAL: docker-compose.yml NOT FOUND!"
              exit 1
            fi
