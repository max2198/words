name: Deploy App
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: root
          password: ${{ secrets.PASSWORD }}
          port: 2221 # Твой порт
          # ВАЖНО: пробрасываем секрет внутрь скрипта
          envs: GH_TOKEN
          script: |
            export GH_TOKEN=${{ secrets.GH_TOKEN }}
            mkdir -p ~/projects/my-app
            cd ~/projects/my-app
            
            # Очистка, если прошлая попытка создала пустую папку
            if [ ! -d .git ]; then
              cd .. && rm -rf my-app && mkdir my-app && cd my-app
            fi

            echo "Starting clone..."
            # Используем переменную окружения
            git clone https://x-access-token:$GH_TOKEN@://github.com . || (git fetch --all && git reset --hard origin/main)

            echo "Checking files:"
            ls -la
            
            if [ -f "docker-compose.yml" ]; then
              echo "Starting Docker..."
              docker compose up -d --build
            else
              echo "Error: docker-compose.yml not found!"
              exit 1
            fi
