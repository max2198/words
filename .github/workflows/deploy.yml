name: Deploy App
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: root
          password: ${{ secrets.PASSWORD }}
          port: 2221 # Твой порт
          # ВАЖНО: пробрасываем секрет внутрь скрипта
          envs: GH_TOKEN
          script: |
            mkdir -p ~/projects/my-app
            cd ~/projects/my-app

            echo "Configuring git..."
            # Настраиваем авторизацию через заголовок (самый безопасный способ)
            git config --global http.https://github.com "AUTHORIZATION: basic $(echo -n x-access-token:${{ secrets.GH_TOKEN }} | base64)"

            if [ -d .git ]; then
              echo "Updating..."
              git fetch --all
              git reset --hard origin/main
            else
              echo "Cloning..."
              # Теперь ссылка чистая, без токена внутри (авторизация сработает из конфига)
              git clone https://github.com .
            fi

            echo "List of files:"
            ls -F

            if [ -f "docker-compose.yml" ]; then
              docker compose up -d --build
            else
              echo "Still no docker-compose.yml found!"
              exit 1
            fi
