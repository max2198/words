name: Deploy App
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: root
          password: ${{ secrets.PASSWORD }}
          port: 2221 # Оставь свой порт (2221 или 2222)
          script: |
            REPO_URL=$(echo "aHR0cHM6Ly9naXRodWIuY29tL21heDIxOTgvd29yZHMuZ2l0" | base64 --decode)
            
            # Создаем и СРАЗУ ПОЛНОСТЬЮ вычищаем папку
            mkdir -p ~/projects/my-app
            rm -rf ~/projects/my-app/* ~/projects/my-app/.* 2>/dev/null || true
            cd ~/projects/my-app

            echo "Cloning from URL..."
            git clone "$REPO_URL" .
            
            echo "Files list:"
            ls -F
            
            if [ -f "docker-compose.yml" ]; then
              # Добавляем -p words, чтобы у проекта было четкое имя в докере
              docker compose -p words up -d --build
            else
              echo "CRITICAL: docker-compose.yml NOT FOUND!"
              exit 1
            fi
