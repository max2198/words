name: Deploy App
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: root
          password: ${{ secrets.PASSWORD }}
          port: 2221 # Проверь, 2221 или 2222!
          script: |
            mkdir -p ~/projects/my-app
            cd ~/projects/my-app

            # Чистим папку, если там завис неудачный клон
            if [ ! -d .git ]; then
              rm -rf * .git
            fi

            echo "Cloning repository..."
            # Используем токен напрямую в ссылке, без лишних пробелов
            git clone https://x-access-token:${{ secrets.GH_TOKEN }}@://github.com/max2198/words/ . || (git fetch --all && git reset --hard origin/main)

            echo "Checking files:"
            ls -la

            if [ -f "docker-compose.yml" ]; then
              echo "File found! Starting Docker..."
              docker compose up -d --build
            else
              echo "CRITICAL: docker-compose.yml NOT FOUND in $(pwd)"
              exit 1
            fi
