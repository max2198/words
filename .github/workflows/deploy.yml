name: Deploy App
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: root
          password: ${{ secrets.PASSWORD }}
          port: 2221 # Если ты настраивал 2221, поменяй здесь
          script: |
            mkdir -p ~/projects/my-app
            cd ~/projects/my-app
            
            if [ -d .git ]; then
              echo "Updating repository..."
              git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@://github.com
              git fetch --all
              git reset --hard origin/main
            else
              echo "Cloning private repository..."
              # Прямая ссылка с токеном доступа
              git clone https://x-access-token:${{ secrets.GH_TOKEN }}@://github.com .
            fi
            
            echo "Current files:"
            ls -la
            
            if [ -f docker-compose.yml ]; then
              echo "Starting Docker..."
              docker compose up -d --build
            else
              echo "Error: docker-compose.yml not found in the repository!"
              exit 1
            fi

