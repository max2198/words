name: Deploy App
on:
  push:
    branches: [ main ] # Скрипт сработает при пуше в ветку main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: root
          password: ${{ secrets.PASSWORD }}
          port: 2221 # Твой новый порт SSH
          script: |
            mkdir -p ~/projects/my-app
            cd ~/projects/my-app
            
            if [ -d .git ]; then
              echo "Updating repository..."
              git fetch --all
              git reset --hard origin/main
            else
              echo "Cloning repository..."
              # ВНИМАНИЕ: Вставь сюда свою ссылку! 
              # Например: https://github.com
              https://github.com/max2198/words
            fi
            
            # Проверяем, скачались ли файлы
            ls -la
            
            echo "Starting Docker..."
            docker compose up -d --build
