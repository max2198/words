name: Deploy App
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: root
          password: ${{ secrets.PASSWORD }}
          port: 2221
          # ЯВНО ПЕРЕДАЕМ ТОКЕН В ОКРУЖЕНИЕ
          envs: GH_TOKEN
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          script: |
            mkdir -p ~/projects/my-app
            cd ~/projects/my-app

            # Очистка папки от неудачных попыток
            if [ ! -d .git ]; then
              rm -rf * .git
            fi

            echo "Cloning repository..."
            # Используем переменную окружения через $
            git clone https://x-access-token:$GH_TOKEN@://github.com . || (git fetch --all && git reset --hard origin/main)

            echo "Checking files:"
            ls -F

            if [ -f "docker-compose.yml" ]; then
              echo "Success! Starting Docker..."
              docker compose up -d --build
            else
              echo "Error: docker-compose.yml not found!"
              exit 1
            fi
