name: Deploy App
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: root
          password: ${{ secrets.PASSWORD }}
          port: 2221 # Оставь свой порт (2221 или 2222)
          script: |
            # 1. Заходим в папку или создаем её
            mkdir -p ~/projects/my-app
            cd ~/projects/my-app

            # 2. ПОЛНОСТЬЮ очищаем папку, чтобы не было конфликтов
            rm -rf * .git

            echo "Starting clone of public repository..."
            # 3. Клонируем с явным указанием ссылки БЕЗ переменных
            git clone https://github.com .

            echo "Files found on server:"
            ls -F

            # 4. Проверяем наличие файла и запускаем
            if [ -f "docker-compose.yml" ]; then
              echo "Success! Starting Docker..."
              docker compose up -d --build
            else
              echo "CRITICAL ERROR: docker-compose.yml NOT FOUND!"
              echo "Full path is: $(pwd)"
              exit 1
            fi
